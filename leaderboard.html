<div class="main">
<div class="card">

<h1>🏆 Leaderboard</h1>
<ul id="leaders"></ul>

</div>
</div>

<script src="script.js"></script>

<script>
let scores = JSON.parse(localStorage.getItem("scores")) || [];
scores.sort((a,b)=>b.score-a.score);

let html = "";
scores.forEach((s,i)=>{
    html += `<li>${i+1}. ${s.name} - ${s.score}</li>`;
});
document.getElementById("leaders").innerHTML = html;
</script>

</body>
